<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phase 10 Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');

        * {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Ubuntu', sans-serif;
        }

        .card {
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        /* Animasi Modal */
        .modal-enter {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-blue-600 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight">Phase 10 Scoreboard</h1>
            <button onclick="resetGame()"
                class="text-xs bg-blue-700 px-3 py-1 rounded-full border border-blue-400">Reset</button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 pb-24">
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-200 text-center">
            <div class="flex flex-col gap-3">
                <input id="playerName" type="text" placeholder="New Player Name"
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="addPlayer()"
                    class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold active:bg-blue-800 transition-colors">
                    + Add Player
                </button>
            </div>
        </div>

        <div id="playerContainer" class="flex flex-col gap-4"></div>

        <div id="emptyState" class="text-center py-10 text-slate-400">
            <p class="text-sm italic text-center">Player is empty. Add Player to play</p>
        </div>
    </main>

    <div id="pointModal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-[18rem] rounded-2xl shadow-2xl modal-enter p-5">
            <h3 id="modalTitle" class="text-lg font-bold mb-3 text-center text-slate-800">Add Point</h3>
            <input id="pointInput" type="number" placeholder="Enter points..."
                class="w-full p-3 bg-slate-100 border-none rounded-xl text-center text-2xl font-bold mb-3 outline-none focus:ring-2 focus:ring-blue-500">

            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeModal()"
                    class="py-3 rounded-xl font-bold text-slate-500 bg-slate-100">Cancel</button>
                <button onclick="confirmScore()" class="py-3 rounded-xl font-bold text-white bg-blue-600">Save</button>
            </div>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('phase10_mobile_data')) || [];
        let activePlayerId = null;

        const phases = [
            "2 Sets of 3 ( AAA + BBB )",
            "1 Set of 3 + 1 Run of 4 ( AAA + ABCD )",
            "1 Set of 4 + 1 Run of 4 ( AAAA + ABCD )",
            "1 Run of 7 ( ABCDEFG )",
            "1 Run of 8 ( ABCDEFGH )",
            "1 Run of 9 ( ABCDEFGHI )",
            "2 Sets of 4 ( AAAA + BBBB )",
            "7 Cards of 1 Color",
            "1 Set of 5 + 1 Set of 2 ( AAAAA + BB )",
            "1 Set of 5 + 1 Set of 3 ( AAAAA + BBB )"
        ];

        function saveData() {
            localStorage.setItem('phase10_mobile_data', JSON.stringify(players));
            checkEmptyState();
        }

        function checkEmptyState() {
            document.getElementById('emptyState').style.display = players.length === 0 ? 'block' : 'none';
        }

        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            if (nameInput.value.trim() === "") return;
            players.push({
                id: Date.now(),
                name: nameInput.value.trim(),
                currentPhase: 1,
                score: 0,
                history: [] // Untuk mencatat riwayat poin
            });
            nameInput.value = "";
            saveData();
            renderPlayers();
        }

        // MODAL LOGIC
        function openPointModal(id) {
            activePlayerId = id;
            const p = players.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = `Point for ${p.name}`;
            document.getElementById('pointModal').classList.remove('hidden');
            document.getElementById('pointInput').focus();
        }

        function closeModal() {
            document.getElementById('pointModal').classList.add('hidden');
            document.getElementById('pointInput').value = "";
            activePlayerId = null;
        }

        function confirmScore() {
            const input = document.getElementById('pointInput');
            const points = parseInt(input.value) || 0;
            const p = players.find(x => x.id === activePlayerId);

            if (p) {
                p.score += points;
                p.history.push(points); // Tambahkan ke history
                saveData();
                renderPlayers();
                closeModal();
            }
        }

        function updatePhase(id, inc) {
            const p = players.find(x => x.id === id);
            if (p) {
                p.currentPhase = Math.min(Math.max(p.currentPhase + inc, 1), 10);
                saveData();
                renderPlayers();
            }
        }

        function resetGame() {
            if (confirm("Reset all game data?")) {
                players = [];
                localStorage.removeItem('phase10_mobile_data');
                renderPlayers();
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playerContainer');
            container.innerHTML = "";
            checkEmptyState();

            players.forEach(p => {
                const phaseDesc = phases[p.currentPhase - 1];
                const historyStr = p.history.length > 0 ? p.history.join(' + ') : 'No history';

                container.innerHTML += `
                    <div class="card bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-5 flex justify-between items-center bg-white">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">${p.name}</h3>
                                <p class="text-xs text-blue-600 font-semibold mt-1">Target: <br> ${phaseDesc}</p>
                            </div>
                            <div class="bg-slate-100 px-4 py-2 rounded-xl text-center min-w-[70px]">
                                <span class="block text-xl font-black text-slate-800">${p.score}</span>
                                <span class="text-[9px] uppercase font-bold text-slate-400 tracking-tighter">Point</span>
                            </div>
                        </div>

                        <div class="px-5 mb-3">
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">History</p>
                            <p class="text-xs text-slate-500 italic truncate">${historyStr}</p>
                        </div>
                        
                        <div class="px-5 pb-5 grid grid-cols-2 gap-3">
                            <div class="col-span-2 flex items-center justify-between bg-slate-50 rounded-xl p-1 mb-2">
                                <button onclick="updatePhase(${p.id}, -1)" class="w-12 h-10 flex items-center justify-center text-slate-400">◀</button>
                                <span class="font-bold text-slate-700 text-sm italic text-center">PHASE ${p.currentPhase}</span>
                                <button onclick="updatePhase(${p.id}, 1)" class="w-12 h-10 flex items-center justify-center text-slate-400">▶</button>
                            </div>
                            
                            <button onclick="openPointModal(${p.id})" 
                                class="bg-slate-800 text-white py-3 rounded-xl font-bold text-sm">
                                + Point
                            </button>
                            <button onclick="if(confirm('Kick Player?')){players=players.filter(x=>x.id!==${p.id});saveData();renderPlayers();}"
                                class="bg-red-50 text-red-500 py-3 rounded-xl font-bold text-sm">
                                Kick
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        renderPlayers();
    </script>
</body>

</html>
